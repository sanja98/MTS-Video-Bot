name: MTS-Auto-Pilot-Bot

on:
  schedule:
    # IST: 10:30 AM aur 7:30 PM par run hoga
    - cron: '0 5,14 * * *' 
  workflow_dispatch: 

concurrency:
  group: mts-video-group
  cancel-in-progress: false 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation
          pip install edge-tts pydub moviepy==1.0.3 requests numpy Pillow scipy google-api-python-client google-auth-oauthlib

      - name: Run MTS Video Script
        env:
          KEY1: ${{ secrets.KEY1 }}
          KEY2: ${{ secrets.KEY2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python -u script.py

      - name: Save Progress
        if: always()
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git pull origin main --rebase
          git add processed.txt || exit 0
          git commit -m "Auto-Update: Topic Done" || exit 0
          git push origin main
