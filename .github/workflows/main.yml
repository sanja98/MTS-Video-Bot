name: MTS-Auto-Pilot-Bot

on:
  schedule:
    # IST: Subah 10:30 AM aur Shaam 7:30 PM par auto-run hoga
    - cron: '0 5,14 * * *' 
  workflow_dispatch: # Manual run button ke liye

# Ek waqt mein ek hi video render hogi
concurrency:
  group: mts-video-group
  cancel-in-progress: false 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history zaroori hai rebase ke liye

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation
          pip install edge-tts pydub moviepy==1.0.3 requests numpy Pillow scipy google-api-python-client google-auth-oauthlib

      - name: Run MTS Video Script
        env:
          KEY1: ${{ secrets.KEY1 }}
          KEY2: ${{ secrets.KEY2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python -u script.py

      # 🛡️ FIXED SAVE PROGRESS (No more Error 128)
      - name: Save Progress
        if: always()
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # Faltu files hatao taaki rasta saaf rahe
          rm -f video.mp4 thumb.jpg thumbnail.jpg tick.wav frame.jpg
          rm -rf temp_audio
          
          # Changes ko temporary save karo
          git add processed.txt || echo "No changes to add"
          
          # Pull rebase karo (Conflict avoid karne ke liye)
          git pull origin main --rebase
          
          # Commit aur Push
          git commit -m "Auto-Update: Topic Done" || exit 0
          git push origin main || (git pull origin main --rebase && git push origin main)
