name: MTS-Auto-Pilot-Bot

on:
  schedule:
    - cron: '*/13 * * * *'  # Har 20 minute mein auto-run
  workflow_dispatch:        # Manual button ke liye

# 🛡️ Concurrency: Ek waqt mein ek hi video, koi takrar nahi
concurrency:
  group: mts-video-group
  cancel-in-progress: false 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # 1. Setup Python (Updated to v5 for Node.js 24 support)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation
          pip install edge-tts pydub moviepy==1.0.3 requests numpy Pillow scipy

      # 2. Checkout (Updated to v4 for Node.js 24 support)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 3. Run MTS Video Script
      - name: Run MTS Video Script
        env:
          KEY1: ${{ secrets.KEY1 }}
          KEY2: ${{ secrets.KEY2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python -u script.py

      # 4. Save Progress (FIX: Git Stash Logic for Error 128)
      - name: Save Progress
        if: always()
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # A. Naye changes ko cupboard (stash) mein chhupao
          git stash || echo "No changes to stash"
          
          # B. GitHub se naya data pull karo (Ab rasta saaf hai)
          git pull origin main --rebase
          
          # C. Chhupaye hue changes wapas lao
          git stash pop || echo "No changes to pop"
          
          # D. Ab Add, Commit aur Push karo
          git add processed.txt || exit 0
          git commit -m "Auto-Update: Next Topic Done" || exit 0
          git push origin main || (git pull origin main --rebase && git push origin main)
