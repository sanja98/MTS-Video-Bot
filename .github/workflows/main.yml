name: MTS-Auto-Pilot-Bot
on:
  schedule:
    - cron: '*/18 * * * *'  # Har 15 min mein check karega
  workflow_dispatch:        # Manual Start ke liye

# 🛡️ Ye line sabse zaruri hai: Ek waqt mein ek hi video banne dega
concurrency:
  group: mts-video-group
  cancel-in-progress: false 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.10'}
      
      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation
          pip install edge-tts pydub moviepy==1.0.3 requests numpy Pillow scipy
      
      - name: Run Script
        env:
          KEY1: ${{ secrets.KEY1 }}
          KEY2: ${{ secrets.KEY2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python -u script.py
        
      - name: Commit Progress
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add processed.txt
          git commit -m "Next topic done" || exit 0
          git push
