name: MTS-Auto-Pilot-Bot

on:
  schedule:
    - cron: '*/20 * * * *'  # Har 20 minute mein chalega
  workflow_dispatch:        

concurrency:
  group: mts-video-group
  cancel-in-progress: false 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation
          pip install edge-tts pydub moviepy==1.0.3 requests numpy Pillow scipy

      # IMPORTANT: Checkout last moment par karo taaki fresh processed.txt mile
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Script
        env:
          KEY1: ${{ secrets.KEY1 }}
          KEY2: ${{ secrets.KEY2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python -u script.py

      - name: Save Progress (Error 128 Fix)
        if: always() # Video fail bhi ho tab bhi progress save karne ki koshish kare
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # 1. Jo changes hue hain unhe stage karo
          git add processed.txt || exit 0
          
          # 2. Rebase pull: Agar remote par kuch naya hai toh usey pehle le aao
          # Isse Error 128 (Rejected) khatam ho jata hai
          git pull origin main --rebase
          
          # 3. Commit changes
          git commit -m "Auto-Update: Topic Processed" || exit 0
          
          # 4. Push with Retry: Agar fail ho toh phir se pull karke try karega
          git push origin main || (git pull origin main --rebase && git push origin main)
