name: MTS-Auto-Pilot-Bot

on:
  schedule:
    # IST: Subah 10:30 AM aur Shaam 7:30 PM par auto-run hoga
    - cron: '0 5,14 * * *' 
  workflow_dispatch: # Manual run button ke liye

# Ek waqt mein ek hi video render hogi taaki crash na ho
concurrency:
  group: mts-video-group
  cancel-in-progress: false 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # Node.js 24 support ke liye v4 use kiya hai
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Rebase ke liye full history zaroori hai

      # Node.js 24 support ke liye v5 use kiya hai
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation
          pip install edge-tts pydub moviepy==1.0.3 requests numpy Pillow scipy google-api-python-client google-auth-oauthlib

      - name: Run MTS Video Script
        env:
          KEY1: ${{ secrets.KEY1 }}
          KEY2: ${{ secrets.KEY2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python -u script.py

      # 🛡️ SAFE SAVE PROGRESS (Universal Fix for Error 128)
      - name: Save Progress
        if: always()
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # 1. Faltu aur badi files saaf karo taaki load na pade
          rm -f video.mp4 thumb.jpg thumbnail.jpg tick.wav frame.jpg
          rm -rf temp_audio
          
          # 2. Jo badlav (processed.txt) hue hain unhe cupboard (stash) mein chhupao
          git stash push --include-untracked || echo "No changes to stash"
          
          # 3. Naya data bina takrar ke pull karo
          git pull origin main --rebase
          
          # 4. Chhupaye hue badlav wapas nikalo
          git stash pop || echo "Nothing to pop"
          
          # 5. Ab finally add aur push karo
          git add processed.txt || exit 0
          git commit -m "Auto-Update: Topic Done" || exit 0
          git push origin main
